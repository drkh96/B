  <style>
/* ui--styles--themes--index.css */
:root {
  --background:#070B16;
  --surface:#111827;
  --card:#1A2235;
  --primary:#2563EB;
  --secondary:#7C3AED;
  --success:#10B981;
  --warning:#F59E0B;
  --danger:#EF4444;
  --text:#F8FAFC;
  --text-secondary:#94A3B8;
  --border:rgba(255,255,255,.08);
  --glow: rgba(37, 99, 235, .35);
}

/* ui--styles--themes--boy.css */
body.theme-boy {
  --background:#071423;
  --surface:#0F1E35;
  --card:#152742;
  --primary:#2563EB;
  --secondary:#06B6D4;
  --text:#FFFFFF;
}

/* ui--styles--themes--girl.css */
body.theme-girl {
  --background:#170814;
  --surface:#2A1028;
  --card:#351336;
  --primary:#EC4899;
  --secondary:#F472B6;
  --text:#FFF8FC;
}

/* ui--styles--themes--custom.css */

/* ui--styles--global.css */

/* ui--pages--home--home.css */
.home-page {
  min-height: 100vh;
  padding: 32px;
  background: var(--background);
  color: var(--text);
}

.hero-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 32px;
  box-shadow: 0 0 40px var(--glow);
}

.eyebrow {
  color: var(--secondary);
  font-weight: 700;
}

.hero-card h1 {
  font-size: 56px;
  margin: 10px 0;
}

.subtitle {
  color: var(--text-secondary);
}

.theme-buttons {
  margin-top: 24px;
  display: flex;
  gap: 12px;
}

.theme-buttons button,
.subject-card {
  border: 0;
  border-radius: 18px;
  padding: 16px 20px;
  background: var(--card);
  color: var(--text);
  cursor: pointer;
}

.subject-grid {
  margin-top: 28px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
}

.subject-card {
  min-height: 130px;
  font-size: 18px;
}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;}
button{font:inherit;}
@media(max-width:800px){.subject-grid{grid-template-columns:1fr 1fr}.hero-card h1{font-size:42px}}
@media(max-width:520px){.home-page{padding:16px}.subject-grid{grid-template-columns:1fr}.theme-buttons{flex-direction:column}}

</style>
</head>
