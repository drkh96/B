/* ===== Three-column clinical workspace ===== */
.page.clinical-workspace{width:min(1500px,calc(100% - 24px));padding-top:24px}
.workspace-head{grid-column:1/-1}.clinical-grid{display:grid;grid-template-columns:minmax(260px,.8fr) minmax(300px,1fr) minmax(390px,1.35fr);gap:16px;align-items:start;direction:ltr}
.workspace-column{direction:rtl;background:var(--surface);border:1px solid var(--border);border-radius:20px;min-height:630px;overflow:hidden}
.workspace-column.sticky{position:sticky;top:88px;max-height:calc(100vh - 108px);overflow:auto}
.column-head{padding:18px 20px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,color-mix(in srgb,var(--primary) 15%,var(--surface)),var(--surface));position:sticky;top:0;z-index:3}
.column-head h2{font-size:18px;margin:0}.column-head p{font-size:12px;color:var(--muted);margin:5px 0 0}.column-body{padding:16px}
.ddx-card{display:grid;grid-template-columns:34px 1fr auto;gap:10px;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}

.reason-block{padding:14px;border:1px solid var(--border);border-radius:15px;background:var(--card);margin-bottom:12px}.reason-block h3{font-size:13px;color:#93c5fd;margin:0 0 8px}.reason-block p{margin:0;line-height:1.65;color:var(--text);font-size:14px}.reason-block.warning{border-color:rgba(239,68,68,.48);background:rgba(239,68,68,.09)}.reason-block.warning h3{color:#fca5a5}.mini-list{margin:0;padding-right:18px}.mini-list li{margin:7px 0;color:var(--muted);font-size:13px}
.current-question{padding:4px}.current-question .question{margin:0;background:transparent;border:0;padding:0}.current-question .answers{grid-template-columns:1fr}.current-question .answer{text-align:right;min-height:58px}.current-question textarea{min-height:105px;margin-top:12px}
.status-label{display:block;font-size:12px;color:var(--muted);font-weight:800;margin:18px 0 8px}.quick-status{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.quick-status button{border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);padding:9px 5px;font-size:12px;cursor:pointer}.quick-status button.selected{border-color:var(--primary);background:color-mix(in srgb,var(--primary) 24%,var(--card))}
.question-nav{display:flex;justify-content:space-between;gap:8px;margin-top:16px}.question-nav button{margin:0;flex:1}.question-counter{font-size:12px;color:var(--muted);text-align:center;margin:10px 0}.section-jump{display:flex;gap:7px;overflow:auto;padding:0 0 12px;scrollbar-width:thin}.section-jump button{white-space:nowrap;border:1px solid var(--border);background:var(--card);color:var(--muted);border-radius:999px;padding:7px 10px;font-size:11px;cursor:pointer}.section-jump button.active{color:white;border-color:var(--primary);background:color-mix(in srgb,var(--primary) 25%,var(--card))}
.workspace-footer{grid-column:1/-1;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.workspace-footer button{margin-top:0}

/* ===== Final visual polish: cleaner mobile-first UI ===== */
:root{
  --bg:#08111f;
  --surface:#111c2d;
  --card:#17253a;
  --text:#f8fafc;
  --muted:#a8b4c5;
  --primary:#3b82f6;
  --secondary:#8b5cf6;
  --border:rgba(255,255,255,.12);
  --danger:#f87171;
  --success:#34d399;
}
body{background:radial-gradient(circle at 85% -10%,rgba(59,130,246,.18),transparent 33%),var(--bg)}
button,input,select,textarea{-webkit-tap-highlight-color:transparent}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:3px solid rgba(96,165,250,.45);outline-offset:2px}
.workspace-column,.panel,.question,.section,.ddx{border-radius:14px}
.workspace-head{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:end}
.workspace-head .progress{grid-column:1/-1}
.session-tools{justify-self:end;align-self:center}
.mode-switch{background:var(--card);border:1px solid var(--border);padding:3px;border-radius:12px;display:flex;gap:3px}
.mode-switch button{min-height:38px;border:0;border-radius:9px;padding:7px 11px;background:transparent;color:var(--muted);font-size:12px;font-weight:800;white-space:nowrap}
.mode-switch button.active{background:var(--primary);color:#fff}
.timer-chip{min-width:58px;text-align:center}
.column-head{background:color-mix(in srgb,var(--surface) 92%,var(--primary));padding:11px 13px}
.column-head h2{font-size:15px;letter-spacing:0}.column-head p{font-size:11px}
.reason-block{border-radius:12px}.reason-block h3{font-size:12px}.reason-block p{line-height:1.55}
.reason-block.warning:not(:has(p:not(:empty))){display:none}
.global-alert{border-radius:12px;padding:9px 11px;line-height:1.45}
.global-alert.safe{display:none!important}
.current-question .q-head h3{font-size:18px;line-height:1.45;margin:5px 0 2px}
.current-question .q-head small{font-size:12px;opacity:.72}
.current-question .answer{border-radius:12px;min-height:52px;padding:12px 13px}
.current-question .answer span{font-size:15px;font-weight:750}
.current-question .answer small{font-size:11px;opacity:.72;margin-top:3px}
.current-question textarea{font-size:16px;min-height:84px;border-radius:12px}
.quick-status{gap:8px}.quick-status button{min-height:44px;font-size:13px;font-weight:800;border-radius:11px}
.question-nav{position:sticky;bottom:-9px;z-index:8;background:linear-gradient(180deg,transparent,var(--surface) 22%);padding-top:14px;padding-bottom:max(2px,env(safe-area-inset-bottom))}
.question-nav button,.workspace-footer button{min-height:46px;border-radius:12px}
.section-jump{padding-bottom:9px;overscroll-behavior-inline:contain}.section-jump button{min-height:36px;padding:7px 11px}
.ddx-card{padding:10px 6px}.prob-label{white-space:nowrap}.support-label{font-size:9px}
.workspace-footer{padding-bottom:max(0px,env(safe-area-inset-bottom))}

@media(max-width:850px){
  body.clinical-mode{overflow:hidden}
  body.clinical-mode header{height:50px}
  body.clinical-mode .page.clinical-workspace{height:calc(100dvh - 50px);padding:7px 8px 8px;gap:6px}
  .workspace-head{grid-template-columns:minmax(0,1fr);align-items:stretch}
  .workspace-head .page-title{display:none!important}
  .session-tools{justify-self:stretch;display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:6px;align-items:center}
  .mode-switch{width:100%}.mode-switch button{flex:1;min-height:40px}
  .global-alert{font-size:11px;padding:7px 9px}
  .clinical-grid.patient-only{display:grid!important;grid-template-columns:1fr!important;min-height:0;height:100%}
  .clinical-grid.patient-only .questions-column{height:100%;min-height:0}
  .questions-column .column-head{display:none}
  .questions-column .column-body{padding:8px}
  .section-jump{margin:0 -2px}
  .current-question .q-head small,.current-question .answer small{display:block;font-size:11px;line-height:1.35;opacity:.68;margin-top:3px}
  .question-counter{margin:4px 0 7px}
  .multi-hint{font-size:11px;padding:5px 8px}
  .answers{gap:8px;margin:11px 0}
  .current-question .answer{min-height:50px}
  .status-label{margin:13px 0 7px}
  .quick-status{grid-template-columns:repeat(2,minmax(0,1fr))}
  .workspace-footer{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .workspace-footer button{width:100%;padding:9px 10px}
}
@media(max-width:390px){
  .session-tools{grid-template-columns:1fr auto}
  .timer-chip{display:none}
  .mode-switch button{font-size:11px;padding:6px 7px}

  .section-jump button{font-size:10px}
  .current-question .q-head h3{font-size:17px}
}
@media(min-width:851px){
  .clinical-grid{grid-template-columns:minmax(205px,23%) minmax(275px,33%) minmax(360px,44%)}
}

    return `<div class="app"><header><button class="brand" data-go="home">\u{1FA7A} <span>MedAid</span></button><div class="head-actions"><span class="save-state">\u0645\u062D\u0641\u0648\u0638 \u062A\u0644\u0642\u0627\u0626\u064A\u0627\u064B</span><button class="icon" id="themeBtn">\u25D0</button></div></header>${content}<footer>Clinical History Taking \u2022 \u0644\u0644\u0627\u0633\u062A\u062E\u062F\u0627\u0645 \u0627\u0644\u062A\u0639\u0644\u064A\u0645\u064A \u0648\u0645\u0633\u0627\u0639\u062F\u0629 \u0627\u0644\u0637\u0627\u0644\u0628 \u0623\u0645\u0627\u0645 \u0627\u0644\u0645\u0631\u064A\u0636 \u0627\u0644\u062D\u0642\u064A\u0642\u064A</footer></div>`;
  }
  function home() {
    return shell(`<main class="home"><section class="hero"><div><span class="eyebrow">Clinical History Trainer</span><h1>History Taking<br>\u0623\u0645\u0627\u0645 \u0627\u0644\u0645\u0631\u064A\u0636 \u0627\u0644\u062D\u0642\u064A\u0642\u064A</h1><p>\u0627\u0633\u0623\u0644 \u0627\u0644\u0645\u0631\u064A\u0636\u060C \u0633\u062C\u0651\u0644 \u0627\u0644\u0625\u062C\u0627\u0628\u0627\u062A\u060C \u062A\u0627\u0628\u0639 \u0627\u0644\u0640 DDx \u0627\u0644\u0645\u0628\u0627\u0634\u0631\u060C \u0648\u0648\u0644\u0651\u062F \u0645\u0644\u062E\u0635\u0627\u064B \u0645\u0646\u0638\u0645\u0627\u064B \u0641\u064A \u0646\u0647\u0627\u064A\u0629 \u0627\u0644\u0645\u0642\u0627\u0628\u0644\u0629.</p><button class="primary" id="startNewHistory">\u0627\u0628\u062F\u0623 History \u062C\u062F\u064A\u062F</button><button class="secondary" data-go="interview">\u0627\u0633\u062A\u0645\u0631\u0627\u0631 \u0627\u0644\u062C\u0644\u0633\u0629 \u0627\u0644\u0645\u062D\u0641\u0648\u0638\u0629</button></div><div class="hero-icon">\u{1FAC0}</div></section><section class="cards"><article><b>1</b><h3>\u0628\u064A\u0627\u0646\u0627\u062A \u0627\u0644\u0645\u0631\u064A\u0636</h3><p>\u0627\u0644\u0627\u0633\u0645\u060C \u0627\u0644\u0639\u0645\u0631\u060C \u0627\u0644\u062C\u0646\u0633\u060C \u0627\u0644\u0645\u0647\u0646\u0629 \u0648\u0627\u0644\u062A\u0627\u0631\u064A\u062E.</p></article><article><b>2</b><h3>Chest Pain History</h3><p>\u0623\u0633\u0626\u0644\u0629 SOCRATES \u0648\u0627\u0644\u0645\u0631\u0627\u062C\u0639\u0629 \u0627\u0644\u062C\u0647\u0627\u0632\u064A\u0629 \u0648\u0627\u0644\u062A\u0627\u0631\u064A\u062E \u0627\u0644\u0633\u0627\u0628\u0642.</p></article><article><b>3</b><h3>Clinical Reasoning</h3><p>\u062A\u0631\u062A\u064A\u0628 \u0627\u0644\u0627\u062D\u062A\u0645\u0627\u0644\u0627\u062A \u062D\u0633\u0628 \u0625\u062C\u0627\u0628\u0627\u062A \u0627\u0644\u0645\u0631\u064A\u0636.</p></article><article><b>4</b><h3>Summary</h3><p>\u0645\u0644\u062E\u0635 \u0642\u0627\u0628\u0644 \u0644\u0644\u0646\u0633\u062E \u0648\u0627\u0644\u0637\u0628\u0627\u0639\u0629.</p></article></section></main>`);
  }
  function patient() {
    const p = data.patient;
    return shell(`<main class="page"><div class="page-title"><button class="back" data-go="home">\u2192</button><div><span>STEP 1</span><h1>\u0628\u064A\u0627\u0646\u0627\u062A \u0627\u0644\u0645\u0631\u064A\u0636</h1></div></div><section class="panel form-grid"><label>\u0627\u0633\u0645 \u0627\u0644\u0645\u0631\u064A\u0636<input data-p="name" value="${esc(p.name)}" placeholder="\u0627\u062E\u062A\u064A\u0627\u0631\u064A"></label><label>\u0627\u0644\u0639\u0645\u0631<input data-p="age" inputmode="numeric" value="${esc(p.age)}"></label><label>\u0627\u0644\u062C\u0646\u0633<select data-p="gender"><option value="">\u0627\u062E\u062A\u0631</option><option ${p.gender === "\u0630\u0643\u0631" ? "selected" : ""}>\u0630\u0643\u0631</option><option ${p.gender === "\u0623\u0646\u062B\u0649" ? "selected" : ""}>\u0623\u0646\u062B\u0649</option></select></label><label>\u0627\u0644\u0645\u0647\u0646\u0629<input data-p="occupation" value="${esc(p.occupation)}"></label><label>\u0627\u0644\u062A\u0627\u0631\u064A\u062E<input type="date" data-p="date" value="${esc(p.date)}"></label></section><div class="bottom-actions"><button class="danger-outline" id="newSession">\u0645\u0633\u062D \u0627\u0644\u062C\u0644\u0633\u0629</button><button class="primary" data-go="interview">\u0627\u0628\u062F\u0623 \u0627\u0644\u0623\u0633\u0626\u0644\u0629 \u2190</button></div></main>`);
  }
  function flatQuestions() {
    let absoluteIndex = 0;
    return allSections().flatMap((section, sectionIndex) => (section.questions || []).map((q, questionIndex) => {
      const item = {
        q,
        section,
        sectionIndex,
        questionIndex,
        absoluteIndex,
        key: `${section.id || sectionIndex}::${q.id || questionIndex}::${absoluteIndex}`
      };
      absoluteIndex += 1;
      return item;
    }));
  }
  function activeQuestionData() {
    const items = flatQuestions();
    if (!items.length) return null;
    let index = items.findIndex((x) => x.key === data.activeQuestionKey);
    // Backward compatibility with sessions saved before unique question keys.
    if (index < 0 && data.activeQuestionId) index = items.findIndex((x) => x.q.id === data.activeQuestionId);
    if (index < 0) index = items.findIndex((x) => !hasRecordedResponse(x.q.id));
    if (index < 0) index = 0;
    data.activeQuestionKey = items[index].key;
    data.activeQuestionId = items[index].q.id;
    return { ...items[index], index, items };
  }
  function selectedAnswerFor(q) {
    return q?.answers?.find((a) => answerIds(q.id).includes(a.id)) || null;
  }

  function positiveScores(state) {
    const rows = state.sortedDDx.filter(d => d.score > 0).slice(0,12);
    const total = rows.reduce((sum,d)=>sum+d.score,0) || 1;
    return rows.map(d=>({...d, probability: Math.round(d.score/total*100)}));
  }
  function dangerFlags(state) {
    const dangerIds = new Set(['myocardial-infarction','acute-coronary-syndrome','aortic-dissection','pulmonary-embolism','pneumothorax']);
    return state.sortedDDx.filter(d=>dangerIds.has(d.id) && d.score >= 10).slice(0,4);
  }
  function smartNextQuestion(active,state) {
    const unanswered = active.items.filter(x=>!hasRecordedResponse(x.q.id));
    if (!unanswered.length) return null;
    const top = new Set(state.sortedDDx.filter(d=>d.score>0).slice(0,5).map(d=>d.id));
    const danger = new Set(['myocardial-infarction','acute-coronary-syndrome','aortic-dissection','pulmonary-embolism','pneumothorax']);
    let best=null,bestScore=-1;
    unanswered.forEach(item=>{
      if(item.q.id===active.q.id) return;
      let score=0;
      (item.q.answers||[]).forEach(a=>(a.effects||[]).forEach(e=>{
        if(top.has(e.diagnosisId)) score += Math.abs(e.score||0)*2;
        if(danger.has(e.diagnosisId)) score += Math.max(0,e.score||0)*3;
      }));
      score -= Math.abs(item.index-active.index)*0.08;
      if(score>bestScore){bestScore=score;best=item;}
    });
    return best || unanswered[0];
  }
  function planForTop(state) {
    const top=state.sortedDDx.find(d=>d.score>0)?.id;
    const report=chest_pain_default.report;
    let exam=[],ix=[],mx=[];
    try { exam=(report.examination(data.patient,state)||{}).items||[]; } catch(e) {}
    try { ix=(report.investigations(data.patient,state)||{}).items||[]; } catch(e) {}
    try { mx=(report.management(data.patient,state)||{}).items||[]; } catch(e) {}
    return {top,exam,ix,mx};
  }

  function reasoningPanel(active, state) {
    if (!active) return '<div class="empty">لا توجد أسئلة.</div>';
    const q=active.q, a=selectedAnswerFor(q), effects=a?.effects||[];
    const why=q.clinicalReasoning?.why||q.why||'هذا السؤال يضيّق الاحتمالات ويفرّق بين الأسباب القلبية والرئوية والهضمية والعضلية.';
    const smart=smartNextQuestion(active,state);
    const flags=dangerFlags(state);
    const top=positiveScores(state).slice(0,3);
    const effectHtml=a ? (effects.length ? effects.map(e=>`<div class="effect-row"><span>${esc(diagnosisNames[e.diagnosisId]||e.diagnosisId)}</span><b class="${e.score>=0?'effect-up':'effect-down'}">${e.score>=0?'+':''}${e.score}</b></div><p>${esc(t(e.reason))}</p>`).join('') : '<p>No direct diagnostic effect.</p>') : '<p>Select an answer.</p>';
    return `<div class="reason-block"><h3>Why ask?</h3><p>${esc(t(why))}</p></div>
      <div class="reason-block"><h3>Interpretation</h3>${effectHtml}</div>
      <div class="reason-block next-smart"><h3>Suggested next</h3><p>${smart?`<b>${esc(t(smart.q.title))}</b><br>${esc(t(smart.q.question))}`:'Questions completed.'}</p>${smart?`<button class="compact-btn" data-active-key="${smart.key}" style="margin-top:7px">Open</button>`:''}</div>
      <div class="reason-block warning"><h3>🚨 Red Flags</h3><p>${flags.length?flags.map(x=>`${diagnosisNames[x.id]||x.id} (${x.score})`).join(' • '):'None.'}</p></div>
      <div class="reason-block"><h3>Top DDx</h3><ul class="mini-list">${top.map(d=>`<li><b>${diagnosisNames[d.id]||d.id}</b> — ${d.probability}%</li>`).join('')||'<li>Insufficient data.</li>'}</ul></div>`;
  }
  function currentQuestionPanel(active) {
    if (!active) return '<div class="empty">لا توجد أسئلة.</div>';
    const q=active.q, selectedIds=answerIds(q.id), status=data.quickStatus?.[q.id]||'', multi=isMultiQuestion(q);
    const sectionButtons=allSections().map((sec,i)=>{const first=sec.questions?.[0];return first?`<button data-active-key="${flatQuestions().find(x=>x.sectionIndex===i)?.key || ""}" class="${i===active.sectionIndex?'active':''}">${i+1}. ${esc(t(sec.title))}</button>`:''}).join('');
    return `<div class="section-jump">${sectionButtons}</div><div class="question-counter"><span class="smart-badge">${hasRecordedResponse(q.id)?'✓ مُسجّل':'السؤال الحالي'}</span> &nbsp; ${active.index+1}/${active.items.length} • ${esc(t(active.section.title))}</div>
      <article class="question ${hasRecordedResponse(q.id)?'answered':''}"><div class="q-head"><div><span>${esc(q.title?.en||t(q.title))}</span><h3>${esc(q.question?.en||t(q.question))}</h3>${q.question?.ar?`<small>${esc(q.question.ar)}</small>`:''}</div>${hasRecordedResponse(q.id)?'<em>✓</em>':''}</div>
      ${multi?'<span class="multi-hint">Multiple choice</span>':''}<div class="answers">${(q.answers||[]).map(a=>`<button class="answer ${selectedIds.includes(a.id)?'selected':''}" aria-pressed="${selectedIds.includes(a.id)}" data-q="${q.id}" data-a="${a.id}"><span>${esc(a.en||a.ar||a.id)}</span>${a.en&&a.ar?`<small>${esc(a.ar)}</small>`:''}</button>`).join('')}</div>
      <span class="status-label">Quick response</span><div class="quick-status">${[['yes','Yes'],['no','No'],['unknown','Unknown'],['na','N/A']].map(([id,label])=>`<button data-status-q="${q.id}" data-status="${id}" class="${status===id?'selected':''}">${label}</button>`).join('')}</div>
      <div class="status-note"></div>
      <textarea data-note="${q.id}" placeholder="ملاحظات...">${esc(data.notes[q.id]||'')}</textarea></article>
      <div class="question-nav"><button class="secondary" data-prev-q ${active.index===0?'disabled':''}>السابق</button><button class="primary" data-next-q ${active.index===active.items.length-1?'disabled':''}>التالي</button></div>`;
  }
  function interview() {
    const state=compute(), pct=completion(), active=activeQuestionData();
    const ddxList=positiveScores(state), flags=dangerFlags(state);
    const alert=flags.length?`<div class="global-alert"><b>🚨 Clinical Alert:</b><span>${flags.map(x=>`${diagnosisNames[x.id]||x.id} (${x.score})`).join(' • ')} — assess urgently.</span></div>`:``;
    return shell(`<main class="page clinical-workspace"><div class="workspace-head"><div class="page-title"><button class="back" data-go="patient">→</button><div><span>CHEST PAIN • ${pct}%</span><h1>History Taking</h1></div></div><div class="progress"><i style="width:${pct}%"></i></div><div class="session-tools"><div class="mode-switch"><button id="patientModeBtn" class="${data.viewMode==='patient'?'active':''}">Patient</button><button id="teachingModeBtn" class="${data.viewMode!=='patient'?'active':''}">Teaching</button></div><button class="compact-btn" id="timerToggle">OSCE</button><span class="timer-chip" id="timerDisplay">08:00</span></div></div>${alert}
      <section class="clinical-grid ${data.viewMode==='patient'?'patient-only':''}">
        <aside class="workspace-column ddx-column"><div class="column-head"><h2>Differential Dx</h2><p>Clinical support</p></div><div class="column-body">${ddxList.map((d,i)=>`<div class="ddx-card"><span class="ddx-rank">${i+1}</span><div><div style="display:flex;justify-content:space-between;gap:6px"><b>${diagnosisNames[d.id]||d.id}</b><span class="prob-label">${d.probability}% <small class="support-label">support</small></span></div><div class="prob-track"><i style="width:${d.probability}%"></i></div><small>${d.reasons?.length?esc(t(d.reasons[d.reasons.length-1])):'No details yet'}</small></div><span class="score-pill">${d.score}</span></div>`).join('')||'<div class="empty">No data yet.</div>'}</div></aside>
        <aside class="workspace-column reasoning-column"><div class="column-head"><h2>Clinical Reasoning</h2><p>Reasoning & red flags</p></div><div class="column-body">${reasoningPanel(active,state)}</div></aside>
        <section class="workspace-column questions-column"><div class="column-head"><h2>Questions</h2><p>Current question</p></div><div class="column-body current-question">${currentQuestionPanel(active)}</div></section>
      </section><div class="workspace-footer"><button class="secondary" id="clearAnswers">Clear</button><button class="primary" data-go="summary">Summary</button></div></main>`);
  }
  function sectionHtml(s, i) {
    return `<details class="section" ${i < 2 ? "open" : ""}><summary><span>${i + 1}</span><div><b>${t(s.title)}</b><small>${(s.questions || []).length} \u0633\u0624\u0627\u0644</small></div></summary><div class="questions">${(s.questions || []).map(questionHtml).join("")}</div></details>`;
  }
  function questionHtml(q) {
    const selected = data.answers[q.id] || "";
    return `<article class="question ${selected ? "answered" : ""}"><div class="q-head"><div><span>${t(q.title)}</span><h3>${t(q.question)}</h3>${q.question?.en ? `<small>${q.question.en}</small>` : ""}</div>${selected ? "<em>\u2713</em>" : ""}</div><div class="answers">${(q.answers || []).map((a) => `<button class="answer ${selected === a.id ? "selected" : ""}" data-q="${q.id}" data-a="${a.id}"><span>${esc(a.ar || a.en || a.id)}</span>${a.en && a.ar ? `<small>${esc(a.en)}</small>` : ""}</button>`).join("")}</div><textarea data-note="${q.id}" placeholder="\u0645\u0644\u0627\u062D\u0638\u0629 \u0645\u0646 \u0643\u0644\u0627\u0645 \u0627\u0644\u0645\u0631\u064A\u0636...">${esc(data.notes[q.id] || "")}</textarea></article>`;
  }
  function summary() {
    const state = compute();
    const p = data.patient;
    const ans = answeredItems();
    const grouped = {};
    ans.forEach(({q,a})=>{(grouped[q.id] ||= {q,answers:[]}).answers.push(a);});
    const statusLabels={yes:"Yes",no:"No",unknown:"Unknown",na:"N/A"};
    const recorded = flatQuestions().filter(({q})=>hasRecordedResponse(q.id)).map(({q})=>{
      const vals=(grouped[q.id]?.answers||[]).map(a=>a.ar||a.en).join(", ");
      const st=data.quickStatus?.[q.id];
      const note=data.notes?.[q.id];
      return `${t(q.title)}: ${vals || statusLabels[st] || "—"}${note?` | Note: ${note}`:""}`;
    }).join("\n");
    const top = state.sortedDDx.filter((x) => x.score !== 0).slice(0, 10);
    const red = top.filter((x) => ["myocardial-infarction", "acute-coronary-syndrome", "aortic-dissection", "pulmonary-embolism", "pneumothorax"].includes(x.id) && x.score >= 10);
    const plan = planForTop(state);
    const ageText=p.age?`${p.age}-year-old`:"patient of unspecified age";
    const genderText=p.gender==="ذكر"?"male":p.gender==="أنثى"?"female":"patient";
    const keyHpi=["site","character","onset","duration","radiation","aggravating","relieving","associated-symptoms"].map(id=>grouped[id]).filter(Boolean).map(g=>`${t(g.q.title)}: ${g.answers.map(a=>a.en||a.ar).join(", ")}`).join("; ");
    const medicalNarrative=`A ${ageText} ${genderText} presented with chest pain. ${keyHpi || "Further characterization has not yet been recorded."}`;
    const text = `CLINICAL HISTORY SUMMARY\n\nPatient: ${p.name || "—"} | Age: ${p.age || "—"} | Gender: ${p.gender || "—"} | Occupation: ${p.occupation || "—"}\nChief complaint: Chest pain\n\nHistory of presenting complaint:\n${medicalNarrative}\n\nRecorded responses:\n${recorded || "No answers recorded"}\n\nMost likely / supported diagnoses:\n${top.map((d, i) => `${i + 1}. ${diagnosisNames[d.id] || d.id} — Clinical Support Score ${d.score}`).join("\n") || "Insufficient data"}\n\nCannot-miss diagnoses:\n${red.map(d=>diagnosisNames[d.id]||d.id).join(", ") || "No strong cumulative red flag detected from recorded answers"}\n\nImportant note: Clinical Support Scores are educational ranking scores, not validated diagnostic probabilities.`
    return shell(`<main class="page"><div class="page-title"><button class="back" data-go="interview">\u2192</button><div><span>FINAL REVIEW</span><h1>\u0645\u0644\u062E\u0635 \u0627\u0644\u0640 History</h1></div></div>${red.length ? `<div class="alert"><b>\u26A0\uFE0F Red flags \u0645\u062D\u062A\u0645\u0644\u0629</b><p>${red.map((x) => diagnosisNames[x.id]).join(" \u2022 ")} \u2014 \u0647\u0630\u0627 \u062A\u0646\u0628\u064A\u0647 \u062A\u0639\u0644\u064A\u0645\u064A \u0648\u0644\u0627 \u064A\u063A\u0646\u064A \u0639\u0646 \u0627\u0644\u062A\u0642\u064A\u064A\u0645 \u0627\u0644\u0633\u0631\u064A\u0631\u064A \u0627\u0644\u0639\u0627\u062C\u0644.</p></div>` : ""}<section class="summary-grid"><article class="panel"><h3>\u0628\u064A\u0627\u0646\u0627\u062A \u0627\u0644\u0645\u0631\u064A\u0636</h3><dl><dt>\u0627\u0644\u0627\u0633\u0645</dt><dd>${esc(p.name || "\u2014")}</dd><dt>\u0627\u0644\u0639\u0645\u0631</dt><dd>${esc(p.age || "\u2014")}</dd><dt>\u0627\u0644\u062C\u0646\u0633</dt><dd>${esc(p.gender || "\u2014")}</dd><dt>\u0627\u0644\u0645\u0647\u0646\u0629</dt><dd>${esc(p.occupation || "\u2014")}</dd></dl></article><article class="panel"><h3>\u0627\u0643\u062A\u0645\u0627\u0644 \u0627\u0644\u0645\u0642\u0627\u0628\u0644\u0629</h3><div class="big-score">${completion()}%</div><p>${Object.keys(data.answers).length} \u0633\u0624\u0627\u0644 \u062A\u0645 \u062A\u0633\u062C\u064A\u0644\u0647</p></article></section><section class="panel"><h3>Clinical Support Ranking</h3>${top.map((d, i) => `<div class="reason"><b>${i + 1}. ${diagnosisNames[d.id] || d.id}</b><span>${d.score}</span>${d.reasons.slice(0, 3).map((r) => `<p>\u2022 ${t(r)}</p>`).join("")}</div>`).join("") || "<p>\u0644\u0627 \u062A\u0648\u062C\u062F \u0628\u064A\u0627\u0646\u0627\u062A \u0643\u0627\u0641\u064A\u0629.</p>"}</section><section class="summary-actions-grid"><article class="panel"><div class="summary-section-title"><h3>🩺 Examination</h3></div><ul class="plan-list">${plan.exam.slice(0,8).map(x=>`<li>${esc(typeof x==='string'?x:(x.title||x.name||JSON.stringify(x)))}</li>`).join('')||'<li>General assessment, vital signs, CVS and respiratory examination.</li>'}</ul></article><article class="panel"><div class="summary-section-title"><h3>🔬 Investigations</h3></div><ul class="plan-list">${plan.ix.slice(0,8).map(x=>`<li>${esc(typeof x==='string'?x:(x.title||x.name||JSON.stringify(x)))}</li>`).join('')||'<li>ECG, troponin, CXR and targeted tests حسب الحالة.</li>'}</ul></article><article class="panel"><div class="summary-section-title"><h3>💊 Management</h3></div><ul class="plan-list">${plan.mx.slice(0,8).map(x=>`<li>${esc(typeof x==='string'?x:(x.title||x.name||JSON.stringify(x)))}</li>`).join('')||'<li>ABCDE, urgent escalation and diagnosis-specific treatment.</li>'}</ul></article></section><section class="panel"><h3>\u0627\u0644\u0646\u0635 \u0627\u0644\u062C\u0627\u0647\u0632 \u0644\u0644\u0646\u0633\u062E</h3><textarea id="summaryText" class="summary-text">${esc(text)}</textarea><div class="bottom-actions"><button class="secondary" id="copySummary">\u0646\u0633\u062E \u0627\u0644\u0645\u0644\u062E\u0635</button><button class="secondary" id="printSummary">\u0637\u0628\u0627\u0639\u0629</button><button class="primary" data-go="interview">\u062A\u0639\u062F\u064A\u0644 \u0627\u0644\u0625\u062C\u0627\u0628\u0627\u062A</button></div></section></main>`);
  }
  function esc(v = "") {
    return String(v).replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[m]);
  }
  function render() {
    const views = { home, patient, interview, summary };
    document.body.className = (data.theme === "girl" ? "theme-girl" : data.theme === "boy" ? "theme-boy" : "") + (data.section === "interview" ? " clinical-mode" : "");
    document.getElementById("app").innerHTML = (views[data.section] || home)();
    bind();
    window.scrollTo(0, 0);
  }
  function bind() {
    const startNewHistory = document.getElementById("startNewHistory");
    if (startNewHistory) startNewHistory.onclick = () => {
      resetSession(true);
      render();
    };
    document.querySelectorAll("[data-go]").forEach((x) => x.onclick = () => {
      data.section = x.dataset.go;
      save();
      render();
    });
    document.querySelectorAll("[data-p]").forEach((x) => x.oninput = () => {
      data.patient[x.dataset.p] = x.value;
      save();
    });
    document.querySelectorAll("[data-q]").forEach((x) => x.onclick = () => {
      const q=flatQuestions().find(i=>i.q.id===x.dataset.q)?.q;
      if(isMultiQuestion(q)){
        const ids=answerIds(x.dataset.q);
        const exists=ids.includes(x.dataset.a);
        let next=exists?ids.filter(id=>id!==x.dataset.a):[...ids,x.dataset.a];
        if(x.dataset.a==="none"||x.dataset.a==="no-risk") next=exists?[]:[x.dataset.a];
        else next=next.filter(id=>id!=="none"&&id!=="no-risk");
        if(next.length) data.answers[x.dataset.q]=next; else delete data.answers[x.dataset.q];
      }else{
        data.answers[x.dataset.q] = x.dataset.a;
      }
      if(data.quickStatus) delete data.quickStatus[x.dataset.q];
      save(); render();
    });
    document.querySelectorAll("[data-note]").forEach((x) => x.oninput = () => {
      data.notes[x.dataset.note] = x.value;
      save();
    });
    document.querySelectorAll("[data-active-key]").forEach((x) => x.onclick = () => {
      data.activeQuestionKey = x.dataset.activeKey;
      const item = flatQuestions().find(i => i.key === data.activeQuestionKey);
      if (item) data.activeQuestionId = item.q.id;
      save(); render();
    });
    document.querySelectorAll("[data-active-q]").forEach((x) => x.onclick = () => {
      const item = flatQuestions().find(i => i.q.id === x.dataset.activeQ);
      if (item) {
        data.activeQuestionKey = item.key;
        data.activeQuestionId = item.q.id;
      }
      save(); render();
    });
    document.querySelectorAll("[data-status-q]").forEach((x) => x.onclick = () => {
      data.quickStatus ||= {};
      const qid=x.dataset.statusQ;
      data.quickStatus[qid] = data.quickStatus[qid]===x.dataset.status ? "" : x.dataset.status;
      if(data.quickStatus[qid]) delete data.answers[qid];
      save(); render();
    });
    const active = activeQuestionData();
    const prev = document.querySelector("[data-prev-q]");
    const next = document.querySelector("[data-next-q]");
    if (prev && active) prev.onclick = () => { if (active.index > 0) { data.activeQuestionKey = active.items[active.index-1].key; data.activeQuestionId = active.items[active.index-1].q.id; save(); render(); } };
    if (next && active) next.onclick = () => { if (active.index < active.items.length-1) { data.activeQuestionKey = active.items[active.index+1].key; data.activeQuestionId = active.items[active.index+1].q.id; save(); render(); } };
    const patientModeBtn=document.getElementById("patientModeBtn");
    const teachingModeBtn=document.getElementById("teachingModeBtn");
    if(patientModeBtn) patientModeBtn.onclick=()=>{data.viewMode="patient";save();render();};
    if(teachingModeBtn) teachingModeBtn.onclick=()=>{data.viewMode="teaching";save();render();};
    const timerBtn=document.getElementById('timerToggle');
    const timerDisplay=document.getElementById('timerDisplay');
    let timerInterval=null;
    const updateTimer=()=>{
      if(!timerDisplay) return;
      let remain=480;
      if(data.timerRunning&&data.timerStart) remain=Math.max(0,480-Math.floor((Date.now()-data.timerStart)/1000));
      const mm=String(Math.floor(remain/60)).padStart(2,'0'), ss=String(remain%60).padStart(2,'0');
      timerDisplay.textContent=`${mm}:${ss}`;
      timerDisplay.classList.toggle('danger',remain<=60);
      if(remain===0&&data.timerRunning){data.timerRunning=false;save();clearInterval(timerInterval);}
    };
    if(window.__medaidTimer) clearInterval(window.__medaidTimer);
    if(timerBtn){timerBtn.onclick=()=>{if(data.timerRunning){data.timerRunning=false;}else{data.timerRunning=true;data.timerStart=Date.now();}save();updateTimer();};updateTimer();timerInterval=setInterval(updateTimer,1000);window.__medaidTimer=timerInterval;}
    const th = document.getElementById("themeBtn");
    if (th) th.onclick = () => {
      data.theme = data.theme === "boy" ? "girl" : data.theme === "girl" ? "default" : "boy";
      save();
      render();
    };
    const ns = document.getElementById("newSession");
    if (ns) ns.onclick = () => {
      if (confirm("\u0645\u0633\u062D \u0643\u0644 \u0628\u064A\u0627\u0646\u0627\u062A \u0627\u0644\u062C\u0644\u0633\u0629\u061F")) {
        resetSession(true);
        render();
      }
    };
    const ca = document.getElementById("clearAnswers");
    if (ca) ca.onclick = () => {
      if (confirm("\u0645\u0633\u062D \u0643\u0644 \u0627\u0644\u0625\u062C\u0627\u0628\u0627\u062A \u0648\u0627\u0644\u0645\u0644\u0627\u062D\u0638\u0627\u062A\u061F")) {
        data.answers = {};
        data.notes = {};
        data.quickStatus = {};
        data.activeQuestionId = "";
        data.activeQuestionKey = "";
        save();
        render();
      }
    };
    const cp = document.getElementById("copySummary");
    if (cp) cp.onclick = async () => {
      await navigator.clipboard.writeText(document.getElementById("summaryText").value);
      cp.textContent = "\u062A\u0645 \u0627\u0644\u0646\u0633\u062E \u2713";
    };
    const pr = document.getElementById("printSummary");
    if (pr) pr.onclick = () => window.print();
  }
  render();
})();
</script></body></html>
